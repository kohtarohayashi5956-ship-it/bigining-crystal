const STORY_EPISODES=[
 {id:'s01',title:'にじの ない あさ',pages:['ある朝、空から色が消えました。赤い花も、青い鳥も、みんな白い影になっています。','「このままでは、にじの王国が眠ってしまうよ」\n小さな星の精霊ルミが、あなたの手のひらに降りてきました。','王国を救うには、ことばと数と歌にかくれた「ひかりのかけら」が必要です。\nあなたの最初の冒険が始まりました。']},
 {id:'s02',title:'名前を なくした 花',pages:['ことばの森で、白い花がしょんぼりしていました。\n「わたしの名前が、どうしても思い出せないの」','花びらのそばに、「さ」「く」「ら」という三つの光が落ちています。','あなたが光を正しい順に並べると、花はやさしい桃色に染まりました。\n「そうだ。わたしは、さくら！」']},
 {id:'s03',title:'コロンの どんぐり',pages:['かずの丘では、リスのコロンがどんぐりを数えていました。\n「ひとつ、ふたつ……あれ？ また最初にもどっちゃった」','木の下には、赤いどんぐりが3こ、茶色いどんぐりが2こありました。','あなたが「ぜんぶで5こ」と教えると、止まっていた小さな風車が回り始めました。']},
 {id:'s04',title:'ピピの はじめての うた',pages:['にじのステージに、小鳥のピピがいました。\n歌いたいのに、最初の音が出てきません。','ステージの床に、A、B、Cの文字が星のように光っています。','あなたがAを見つけると、ピピは「Hello!」と歌いました。\n空に、細い水色のにじがかかりました。']},
 {id:'s05',title:'もやもやぐもの ためいき',pages:['広場の上に、小さな灰色の雲が浮かんでいました。\n雲は「どうせ、ぼくにはできないよ」とつぶやきます。','ルミは怒らずに言いました。\n「できないことがあっても、ひかりはなくならないよ」','あなたが一問ずつ進むたび、雲のすき間から光が差しました。\nもやもや雲は、少しだけ白くなりました。']},
 {id:'s06',title:'えほんの いえの とびら',pages:['森の奥で、古い扉が見つかりました。\n扉には、金色の文字で「よんだ人だけが入れます」と書かれています。','あなたが声に出して読むと、扉はゆっくり開きました。','中には、まだ白紙の絵本が何百冊も並んでいます。\n最初の一冊に、今日の冒険が書き始められました。']},
 {id:'s07',title:'ララと ひみつの しおり',pages:['本好きのうさぎ、ララが棚のすき間を探していました。\n「大切なしおりが見つからないの」','しおりには、次のお話へ行くための言葉が書かれているそうです。','あなたが短い文を順番に並べると、本の間から星のしおりが飛び出しました。']},
 {id:'s08',title:'とまった とけいだい',pages:['かずの丘の時計台は、ずっと3時のまま止まっています。','「長い針と短い針が、帰る場所を忘れたんだ」\nコロンが心配そうに言いました。','あなたが時刻を教えると、時計はカチリと音を立てました。\n王国に、夕方のオレンジ色が戻りました。']},
 {id:'s09',title:'あおい ことば',pages:['ピピは新しい英語の歌を練習しています。\nでも「青」という言葉だけ、歌から抜け落ちていました。','空、池、アクアの小さなしっぽ。王国には青いものがたくさんあります。','あなたが「blue」と言うと、歌の中に青い音が戻りました。']},
 {id:'s10',title:'雨の ひの たね',pages:['雨の日、フローラの花畑に小さな種が落ちていました。','「晴れないと、芽は出ないのかな」\nフローラは心配しました。','けれど種には、雨の水も大切です。\n次の朝、土から小さな緑の芽が顔を出しました。']},
 {id:'s11',title:'ミントの まよいみち',pages:['猫のミントは、森の道で同じ木を何度も通っていました。','「右と左が、もやで見えないの」','あなたが矢印の順番を教えると、木の間に光の道が現れました。\nミントは照れくさそうに、あなたの隣を歩きました。']},
 {id:'s12',title:'月の ブローチ',pages:['夜の広場に、銀色の光が落ちてきました。','それは、がんばった人だけが見つけられる月のブローチです。','ブローチを胸につけると、今日まちがえた問題も、小さな星になってそばに残りました。']},
 {id:'s13',title:'アクアの ちいさな つばさ',pages:['小さなドラゴンのアクアは、大きな空を見上げていました。','「ぼくの翼は小さいから、きっと飛べない」','あなたは、昨日より一問多く進めたことを話しました。\nアクアも一度だけ羽ばたき、ほんの少し地面から浮かびました。']},
 {id:'s14',title:'四つの ひかり',pages:['ことば、かず、英語、くらし。\n四つの場所から集まった光が、噴水の上で回り始めました。','けれど光は、まだ一つに結びつきません。','ルミは言いました。\n「光を結ぶのは、正解の数じゃないよ。毎日ここへ来た、あなたの足あとなんだ」']},
 {id:'s15',title:'もやもや王の へや',pages:['城のいちばん奥で、もやもや王が毛布にくるまっていました。','「まちがえるのが怖くて、王国の色を全部かくしたんだ」','あなたは今日まちがえた問題を見せました。\n「でも、もう一度やったら分かったよ」\nもやもや王は、毛布から片目を出しました。']},
 {id:'s16',title:'にじの クリスタル',pages:['四つの光が、空高くのぼりました。','ことばの緑、かずの金色、英語の青、くらしの桃色。\n光は一つの大きなクリスタルになりました。','王国に七色のにじが戻ります。\nけれど物語は終わりません。白紙の絵本には、まだたくさんのページが残っていました。']},
 {id:'s17',title:'白紙の つづき',pages:['次の日、えほんの家の机に新しい紙が置かれていました。','紙の一番上には、「つぎの おはなしを かく人へ」とあります。','ララは鉛筆を差し出しました。\n「今度は、あなたが見つけたことを教えてね」']},
 {id:'s18',title:'ピピの おはよう',pages:['朝のステージで、ピピが何度も「Good morning!」と練習しています。','最初は小さな声でしたが、仲間が一人ずつ集まると、歌は広場まで届きました。','王国の朝は、前より少しにぎやかになりました。']},
 {id:'s19',title:'五つめの どんぐり',pages:['コロンは、毎日一つずつ特別などんぐりを集めています。','四つ並んだ横に、今日のどんぐりを置きました。','「続けるって、見えない階段を一段ずつのぼることなんだね」']},
 {id:'s20',title:'ねむねむドラゴン',pages:['山の洞窟で、大きなドラゴンが眠っていました。','起こす方法は戦うことではありません。やさしい言葉を三つ届けることでした。','「おはよう」「いっしょに行こう」「だいじょうぶ」\nドラゴンは目を開け、うれしそうにあくびをしました。']},
 {id:'s21',title:'フローラの 花時計',pages:['フローラは、朝に咲く花と夕方に閉じる花を集めています。','花を円の形に植えると、色の変化で時刻が分かる花時計になりました。','時計台と花時計は、同じ時刻を指していました。']},
 {id:'s22',title:'なくならない 光',pages:['雨で外に出られない日、王国は少し静かでした。','「今日は冒険できないの？」とモコが聞きます。','たった五問でも、ひかりは集まります。\n小さな冒険も、大きな冒険と同じように王国を照らしました。']},
 {id:'s23',title:'みんなの 名前',pages:['仲間たちは、自分の名前を一文字ずつ大きな紙に書きました。','名前には、家族が選んだ音や、自分が好きになった音があります。','あなたの名前も、王国の大切な言葉として絵本に記されました。']},
 {id:'s24',title:'あしたの ページ',pages:['夜、ルミは白紙のページを一枚だけ残して本を閉じました。','「ここには、明日の冒険を書くんだよ」','窓の外には、まだ見たことのない小さな星が光っています。']}
];
const SIDE_STORIES={
 lumi:{title:'ルミが 星に なった日',pages:['ルミは昔、夜空から落ちた小さな光でした。','誰かが初めて「やってみよう」と言ったとき、その声に力をもらって星の精霊になったのです。']},
 lala:{title:'ララの 百さつめ',pages:['ララは百冊目の本を開く前に、九十九冊の好きなところを思い出しました。','「たくさん読むと、前の本も新しく見えるね」']},

 pipi:{title:'ピピの 小さな Hello',pages:['ピピは遠くから来た鳥に、勇気を出して「Hello」と言いました。','鳥も「Hello」と返し、二羽は同じ木で歌いました。']},

function today(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function deepClone(x){return JSON.parse(JSON.stringify(x))}
function hash(str){let h=2166136261;for(let i=0;i<str.length;i++){h^=str.charCodeAt(i);h=Math.imul(h,16777619)}return (h>>>0).toString(16).padStart(8,'0')}
function el(tag,props={},children=[]){const n=document.createElement(tag);Object.entries(props||{}).forEach(([k,v])=>{if(k==='className')n.className=v;else if(k==='style'&&v&&typeof v==='object')Object.assign(n.style,v);else if(k.startsWith('on')&&typeof v==='function')n.addEventListener(k.slice(2).toLowerCase(),v);else if(v===true)n.setAttribute(k,'');else if(v!==false&&v!=null)n.setAttribute(k,String(v))});const arr=Array.isArray(children)?children:[children];arr.flat(Infinity).forEach(c=>{if(c==null||c===false)return;n.appendChild(c instanceof Node?c:document.createTextNode(String(c)))});return n}
let questionBuildMode=true,questionSeed=0x1a2b3c4d;
function seededRandom(){questionSeed=(Math.imul(questionSeed,1664525)+1013904223)>>>0;return questionSeed/4294967296}
function shuffle(a){a=[...a];for(let i=a.length-1;i>0;i--){const r=questionBuildMode?seededRandom():Math.random();const j=Math.floor(r*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function sample(arr,n=1){return shuffle([...new Set(arr)]).slice(0,n)}
function showToast(msg){document.querySelector('.toast')?.remove();const t=el('div',{className:'toast'},msg);document.body.appendChild(t);setTimeout(()=>t.remove(),2100)}
function levelInfo(xp=state.xp){let level=1,need=70,rest=xp;while(rest>=need){rest-=need;level++;need=70+(level-1)*18}return {level,cur:rest,next:need,pct:Math.round(rest/need*100)}}

function migrate(s){const d=initialState();if(!s||typeof s!=='object')return d;s={...d,...s};s.appId=APP.id;s.buildings={...d.buildings,...(s.buildings||{})};s.subjectStats={...blankSubjectStats(),...(s.subjectStats||{})};Object.keys(SUBJECTS).forEach(k=>s.subjectStats[k]={total:0,correct:0,...(s.subjectStats[k]||{})});s.unitStats=s.unitStats||{};s.questionStats=s.questionStats||{};s.review=Array.isArray(s.review)?s.review:[];s.questionHistory=Array.isArray(s.questionHistory)?s.questionHistory.slice(-240):[];s.dailyHistory=Array.isArray(s.dailyHistory)?s.dailyHistory.slice(-90):[];s.storyRead=Array.isArray(s.storyRead)?s.storyRead:[];s.bossProgress=s.bossProgress||{};s.bossCleared=Array.isArray(s.bossCleared)?s.bossCleared:[];s.issues=Array.isArray(s.issues)?s.issues:[];s.settings={...d.settings,...(s.settings||{})};s.daily=s.daily||blankDaily();if(s.daily.date!==today())s.daily=blankDaily();return s}
function safeStorage(){try{localStorage.setItem('__bc_test__','1');const ok=localStorage.getItem('__bc_test__')==='1';localStorage.removeItem('__bc_test__');return ok}catch(e){return false}}
function load(){try{const raw=localStorage.getItem(STORE_KEY);if(!raw)return initialState();return migrate(JSON.parse(raw))}catch(e){return recoverCorrupt()||initialState()}}
function save(){try{localStorage.setItem(STORE_KEY,JSON.stringify(state));maybeAutoBackup()}catch(e){}}
function snapshot(){const s=deepClone(state);s.screen='home';s.quiz=null;s.currentStoryId=null;s.storyPage=0;return s}
function buildPackage(source=state,reason=null){const data=source===state?snapshot():deepClone(source);const stateJson=JSON.stringify(data);return {format:'beginning-crystal-save',appId:APP.id,schemaVersion:APP.schema,appVersion:APP.version,exportedAt:new Date().toISOString(),reason,summary:summary(data),checksum:hash(stateJson),state:data}}
function inspectPackage(parsed){if(!parsed||typeof parsed!=='object'||Array.isArray(parsed))throw new Error('セーブデータの形ではありません。');if(parsed.appId!==APP.id)throw new Error('小1版「はじまりのクリスタル」のデータではありません。');if(parsed.format!=='beginning-crystal-save'||!parsed.state)throw new Error('対応していないセーブ形式です。');const raw=parsed.state;if(parsed.checksum&&hash(JSON.stringify(raw))!==parsed.checksum)throw new Error('データが途中で欠けている可能性があります。');return {raw:deepClone(raw),summary:summary(raw),version:parsed.appVersion||'不明',exportedAt:parsed.exportedAt||null}}
function summary(s){const total=Object.values(s.subjectStats||{}).reduce((a,b)=>a+(b.total||0),0);const correct=Object.values(s.subjectStats||{}).reduce((a,b)=>a+(b.correct||0),0);return {playerName:s.playerName||'ひかり',total,correct,level:levelInfo(s.xp||0).level,sessions:s.totalSessions||0}}
function backupSignature(){return `${totalAnswered()}|${state.xp}|${state.coins}|${state.totalSessions}|${state.issues.length}`}
function createAutoBackup(reason='自動バックアップ',force=false){try{const sig=backupSignature();let meta={};try{meta=JSON.parse(localStorage.getItem(BACKUP_META)||'{}')}catch(e){}if(!force&&meta.signature===sig)return false;const pkg=buildPackage(snapshot(),reason);for(let i=BACKUP_KEYS.length-1;i>0;i--){const prev=localStorage.getItem(BACKUP_KEYS[i-1]);if(prev)localStorage.setItem(BACKUP_KEYS[i],prev)}localStorage.setItem(BACKUP_KEYS[0],JSON.stringify(pkg));localStorage.setItem(BACKUP_META,JSON.stringify({signature:sig,at:Date.now(),reason}));return true}catch(e){return false}}
function maybeAutoBackup(){if(!state.setupDone)return;const n=totalAnswered();if(n>0&&n%5===0)createAutoBackup('5問ごとの自動保存')}
function recoverCorrupt(){for(const key of BACKUP_KEYS){try{const raw=localStorage.getItem(key);if(!raw)continue;const info=inspectPackage(JSON.parse(raw));const s=migrate(info.raw);s.backupNotice=true;localStorage.setItem(STORE_KEY,JSON.stringify(s));return s}catch(e){}}return null}
function backupRows(){try{return BACKUP_KEYS.map(key=>{const raw=localStorage.getItem(key);if(!raw)return null;try{const parsed=JSON.parse(raw),info=inspectPackage(parsed);return {key,parsed,info}}catch(e){return {key,broken:true}}}).filter(Boolean)}catch(e){return []}}

function rubyText(text){const root=document.createDocumentFragment(),keys=Object.keys(V11_RUBY).sort((a,b)=>b.length-a.length);let i=0,buffer='';const flush=()=>{if(buffer){root.appendChild(document.createTextNode(buffer));buffer=''}};while(i<String(text).length){const ch=String(text)[i];if(ch==='\n'){flush();root.appendChild(document.createElement('br'));i++;continue}const key=keys.find(k=>String(text).startsWith(k,i));if(key){flush();const ruby=document.createElement('ruby');ruby.appendChild(document.createTextNode(key));const rt=document.createElement('rt');rt.textContent=V11_RUBY[key];ruby.appendChild(rt);root.appendChild(ruby);i+=key.length}else{buffer+=ch;i++}}flush();return root}

function v11HasEnglishVoice(){if(!('speechSynthesis'in window))return false;const voices=speechSynthesis.getVoices();if(!voices.length)return true;return voices.some(v=>String(v.lang||'').toLowerCase().startsWith('en'))}

function v11StarterSequence(day=state.totalSessions){const specs=V11_STARTER_SPECS[Math.min(2,Math.max(0,day))]||V11_STARTER_SPECS[0],used=new Set();return specs.map(([sub,unit,pred])=>{let q=QUESTIONS.find(x=>x.subject===sub&&x.unit===unit&&pred(x)&&!used.has(x.id));if(!q)q=QUESTIONS.find(x=>x.subject===sub&&x.unit===unit&&!v11IsAudioOnly(x)&&!used.has(x.id));if(q)used.add(q.id);return q}).filter(Boolean)}

const v13BaseCurrentStageMax=currentStageMax;
function v13SubjectStageMax(subject){
  const base=v13BaseCurrentStageMax();
  if(subject==='えいご'||!v13Challenge())return base;
  return Math.min(3,Math.max(2,base+1));
}
function v13UniqueAdd(out,rows,n){for(const q of rows){if(out.length>=n)break;if(q&&!out.some(x=>x.id===q.id))out.push(q)}return out}
const v13BaseChooseQuestions=chooseQuestions;
chooseQuestions=function(subject,n){
  ensureV13();
  if(subject==='えいご'||!v13Challenge())return v13BaseChooseQuestions(subject,n);
  const max=v13SubjectStageMax(subject),recent=recencySet();
  let pool=QUESTIONS.filter(q=>q.subject===subject&&(q.stage??1)<=max&&(q.difficulty??1)<=max);
  if(!pool.length)return v13BaseChooseQuestions(subject,n);
  const due=dueReviews(subject).filter(q=>pool.some(x=>x.id===q.id));
  const easyUnits=V13_EASY_UNITS[subject]||new Set();
  let preferred=pool.filter(q=>(q.stage??1)>=2&&((q.difficulty??1)>=2||!easyUnits.has(q.unit)));
  if(preferred.length<n)preferred=pool.filter(q=>(q.stage??1)>=2||(q.difficulty??1)>=2);
  const out=[];
  v13UniqueAdd(out,shuffle(due).slice(0,1),n);
  const hardTarget=Math.max(out.length,Math.ceil(n*.7));
  const hardCandidates=weightedPick(preferred,Math.min(preferred.length,Math.max(n*4,16)),subject)
    .sort((a,b)=>((b.stage??1)*3+(b.difficulty??1)*2-(recent.has(b.id)?3:0))-((a.stage??1)*3+(a.difficulty??1)*2-(recent.has(a.id)?3:0)));
  v13UniqueAdd(out,hardCandidates,hardTarget);
  v13UniqueAdd(out,weightedPick(pool,Math.min(pool.length,Math.max(n*4,20)),subject),n);
  v13UniqueAdd(out,shuffle(pool),n);
  return shuffle(out.slice(0,n));
};

/* K) Make stage-2 generated word-problem distractors mathematically meaningful. */
function v132NumericChoices(q,answer,candidates){
  const a=String(answer),seen=new Set([normalizeAnswer(a)]),wrongs=[];
  for(const x of candidates){
    const s=String(x);if(s.startsWith('-'))continue;
    const k=normalizeAnswer(s);if(!seen.has(k)){seen.add(k);wrongs.push(s)}
    if(wrongs.length>=3)break;
  }
  q.choices=v131PlaceAnswer(a,wrongs,q.id);
}
QUESTIONS.filter(q=>q.subject==='さんすう'&&q.unit==='ぶんしょうだい'&&q.id>=20569&&q.id<50000).forEach(q=>{
  let m=q.prompt.match(/りんごが (\d+)こ あります。(\d+)こ もらいました。/);
  if(m){
    const a=Number(m[1]),b=Number(m[2]),ans=a+b;
    v132NumericChoices(q,ans,[a,b,Math.abs(a-b),ans-1,ans+1]);return;
  }
  m=q.prompt.match(/どんぐりが (\d+)こ あります。(\d+)こ あげました。/);
  if(m){
    const a=Number(m[1]),b=Number(m[2]),ans=a-b;
    v132NumericChoices(q,ans,[a+b,a,b,ans+1,Math.max(0,ans-1)]);
  }
});

/* L) Keep four numeric choices where a generated duplicate had reduced the list to three. */
QUESTIONS.filter(q=>q.type==='choice'&&q.subject==='さんすう'&&q.choices.length<4&&/^\d+$/.test(String(q.answer))).forEach(q=>{
  const ans=Number(q.answer),seen=new Set(q.choices.map(normalizeAnswer));
  const candidates=[ans+1,Math.max(0,ans-1),ans+2,Math.max(0,ans-2),ans+3,0,10,20];
  for(const x of candidates){
    const k=normalizeAnswer(x);if(!seen.has(k)){q.choices.push(String(x));seen.add(k)}
    if(q.choices.length>=4)break;
  }
});

  const recent=v132BaseRecencySet();
  V132_EQUIVALENT_QUESTION_GROUPS.forEach(group=>{
    if(group.some(id=>recent.has(id)))group.forEach(id=>recent.add(id));

};
